[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mac-agent"
version = "0.1.4"
description = "A lightweight multi-agent coordination ledger for task handoff, context handoff, and quality gates."
readme = "README.md"
requires-python = ">=3.10"
keywords = ["ai-agents", "coordination", "task-ledger", "handoff", "testing"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "pydantic>=2.0",
  "fastapi>=0.110",
]

[project.optional-dependencies]
dev = [
  "build>=1.2",
  "httpx>=0.27",
  "pytest>=8.0",
  "twine>=6.0",
]

[project.scripts]
mac-agent = "mac.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/mac"]
